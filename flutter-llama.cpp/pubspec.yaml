name: onenm_local_llm
description: >-
  Flutter plugin for on-device LLM inference on Android using llama.cpp.
  Simplifies model management, loading, and multi-turn chat — no cloud,
  no API keys, fully offline.
version: 0.1.3
repository: https://github.com/SxryxnshS5/onenm_local_llm/tree/main/flutter-llama.cpp
issue_tracker: https://github.com/SxryxnshS5/onenm_local_llm/issues
topics:
  - ai
  - llm
  - llama
  - on-device
  - inference

environment:
  sdk: ^3.5.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  path_provider: ^2.1.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.theorangeshade.onenm_local_llm
        pluginClass: OnenmLocalLlmPlugin
