name: onenm_local_llm
description: >-
  On-device LLM inference for Flutter (Android). Run large language models
  locally using llama.cpp — no cloud, no API keys, fully offline.
version: 0.1.0
homepage: https://github.com/SxryxnshS5/1nm_LocalAI_Flutter
repository: https://github.com/SxryxnshS5/1nm_LocalAI_Flutter
issue_tracker: https://github.com/SxryxnshS5/1nm_LocalAI_Flutter/issues

environment:
  sdk: ^3.5.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  path_provider: ^2.1.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.example.onenm_local_llm
        pluginClass: OnenmLocalLlmPlugin
